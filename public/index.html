<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anor_Conformity | Certification</title>
    <style>
        :root { --anor-green: #008450; --anor-gold: #c5a059; --anor-blue: #69a8f2; --bg-light: #f0f2f5; --text-dark: #333; --sidebar-width: 380px; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); margin: 0; display: flex; height: 100vh; color: var(--text-dark); }
        .sidebar { width: var(--sidebar-width); background: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); overflow-y: auto; z-index: 10; }
        .sidebar h1 { color: var(--anor-green); font-size: 1.5rem; margin-bottom: 5px; border-bottom: 3px solid var(--anor-gold); display: inline-block; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.7rem; font-weight: bold; color: #666; margin-bottom: 4px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 9px; border: 1px solid #e0e0e0; border-radius: 6px; box-sizing: border-box; font-size: 0.85rem; background: #fafafa; }
        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }
        .btn-generate { width: 100%; background-color: var(--anor-green); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; text-transform: uppercase; transition: opacity 0.3s; }
        .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none !important; }
        .main-content { flex: 1; padding: 40px; display: flex; align-items: center; justify-content: center; }
        .preview-card { background: white; border-radius: 20px; padding: 30px; width: 90%; max-width: 950px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .preview-box { border: 1px dashed #ccc; border-radius: 12px; padding: 15px; min-height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fdfdfd; }
        #generated-seal { width: 420px; height: 420px; }
        #packaging-preview { max-width: 240px; display: none; }
    </style>
</head>
<body>
<div class="sidebar">
    <h1>ANOR Certification</h1>
    <form id="certificationForm">
        <div class="form-group"><label>Nom de l'Entreprise</label><input type="text" id="companyName" required></div>
        <div class="form-group"><label>Email du Producteur</label><input type="email" id="producerEmail" required></div>
        <div class="form-group"><label>ID Produit</label><input type="text" id="prodID" required></div>
        <div class="form-group"><label>Description Technique</label><textarea id="description" rows="2" required></textarea></div>
        <div class="row">
            <div class="form-group"><label>N° Lot</label><input type="text" id="batchNum" required></div>
            <div class="form-group"><label>Norme</label><input type="text" id="norme" value="NC-0163" required></div>
        </div>
        <div class="row">
            <div class="form-group"><label>Origine</label><input type="text" id="origine" value="Cameroun" oninput="toggleDates()"></div>
            <div class="form-group"><label>Poids / Volume</label><input type="text" id="packagingFormat" required></div>
        </div>
        <div class="form-group"><label>Caractéristiques Emballage</label><input type="text" id="packagingSpecs" required></div>
        <div id="section-dates-international" class="row hidden">
            <div class="form-group"><label>Production</label><input type="date" id="prodDate"></div>
            <div class="form-group"><label>Péremption</label><input type="date" id="expDate"></div>
        </div>
        <div id="section-date-certificat" class="form-group"><label>Date du Certificat</label><input type="date" id="certDate" required></div>
        
        <div class="form-group"><label>📁 Certificats</label><input type="file" id="certFile" accept=".pdf,application/pdf" required></div>
        
        <div class="form-group"><label>📷 Photo Packaging</label><input type="file" id="packFile" accept=".png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp" onchange="previewImg(event)" required></div>
        
        <button type="submit" class="btn-generate" id="btnGenerer">Générer le Kit de Sécurité</button>
    </form>
</div>
<div class="main-content">
    <div class="preview-card">
        <h2>Console de Validation de Conformité</h2>
        <div class="preview-grid">
            <div class="preview-box">
                <h4>Sceau ANOR Officiel</h4>
                <canvas id="generated-seal"></canvas>
            </div>
            <div class="preview-box"><h4>Visuel Produit</h4><img id="packaging-preview"></div>
        </div>
    </div>
</div>
<script>
// URL de l'API en ligne sur Render
const API_URL = "https://anor-project-api.onrender.com";

// --- FONCTIONS D'INTERFACE (UI) ---
function toggleDates() {
    const val = document.getElementById('origine').value.trim().toLowerCase();
    const isCam = val === "cameroun" || val === "";
    document.getElementById('section-dates-international').classList.toggle('hidden', isCam);
    document.getElementById('section-date-certificat').classList.toggle('hidden', !isCam);
    document.getElementById('prodDate').required = !isCam;
    document.getElementById('expDate').required = !isCam;
    document.getElementById('certDate').required = isCam;
}

function previewImg(e) {
    if (e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = document.getElementById('packaging-preview');
            img.src = ev.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    }
}

// --- VISUAL SEED GENERATOR ---
function seededRandomForRender(seed) {
    return function() {
        seed = (seed * 1664525 + 1013904223) % 4294967296;
        return seed / 4294967296;
    };
}

// --- LOGIQUE DE GENERATION ET TRANSMISSION ---
document.getElementById('certificationForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!confirm("Voulez-vous vraiment générer le kit de sécurité ?")) return;

    const btn = document.getElementById('btnGenerer');
    btn.disabled = true;
    btn.innerText = "Synchronisation & Forge...";
    
    try {
        const id_produit = document.getElementById("prodID").value.trim();
        const companyName = document.getElementById("companyName").value.trim();
        
        const packFile = document.getElementById("packFile").files[0];
        const certFile = document.getElementById("certFile").files[0];
        
        if (!packFile || !certFile) {
            throw new Error("La photo du packaging ET le certificat PDF sont obligatoires.");
        }

        const metadata_raw = {
            email: document.getElementById("producerEmail").value,
            batchNum: document.getElementById("batchNum").value,
            norme: document.getElementById("norme").value,
            origin: document.getElementById("origine").value,
            packagingFormat: document.getElementById("packagingFormat").value,
            packagingSpecs: document.getElementById("packagingSpecs").value,
            prodDate: document.getElementById("prodDate").value || null,
            expDate: document.getElementById("expDate").value || null,
            validityDate: document.getElementById("certDate").value || null
        };

        const formData = new FormData();
        formData.append("id_produit", id_produit);
        
        // --- SÉCURITÉ AJOUTÉE : Protection contre le dépassement de taille ---
        const sig = `${companyName} - SECURE_SIGNATURE`.substring(0, 250); 
        formData.append("signature", sig);
        formData.append("metadata_raw", JSON.stringify(metadata_raw));
        formData.append("visuel_packaging", packFile);
        formData.append("certificat_file", certFile);

        // Appel de la route de forge
        const response = await fetch(`${API_URL}/api/sceau/enregistrer`, {
            method: 'POST',
            body: formData
        });

        // Lecture sécurisée du JSON
        const responseText = await response.text();
        let data;
        try {
            data = JSON.parse(responseText);
        } catch (jsonErr) {
            throw new Error("Erreur serveur : format de réponse invalide.");
        }

        if (!response.ok || !data.success) {
            const msgErreur = data.message || "Erreur inconnue du serveur.";
            throw new Error(msgErreur);
        }

        const sealID = data.donnees.id_sceau;
        const matrixBinaire = data.donnees.matrice_binaire;

        await buildPremiumSeal(matrixBinaire, sealID);
        
        alert(`Succès : Sceau ANOR officiellement forgé.\nSealID : ${sealID}`);
        btn.innerText = "✅ SCEAU FORGÉ";
        
    } catch (e) { 
        alert("Erreur de Forge : " + e.message); 
        btn.disabled = false;
        btn.innerText = "Générer le Kit de Sécurité";
    }
});

// --- MOTEUR DE RENDU DU SCEAU GRAPHIQUE (INCHANGÉ) ---
async function buildPremiumSeal(matrixStructure, sealID) {
    const canvas = document.getElementById('generated-seal');
    const ctx = canvas.getContext('2d');
    const SIZE = 800;
    canvas.width = SIZE; canvas.height = SIZE;
    ctx.clearRect(0, 0, SIZE, SIZE);
    const centerX = SIZE / 2; const centerY = SIZE / 2;

    const logo = new Image();
    logo.src = "/logo_anor_master.png"; 
    await new Promise(r => { logo.onload = r; logo.onerror = r; });

    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(centerX, centerY, 380, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#69a8f2"; ctx.lineWidth = 30;
    ctx.beginPath(); ctx.arc(centerX, centerY, 380, 0, Math.PI * 2); ctx.stroke();

    drawDotGridSeal(ctx, matrixStructure, centerX, centerY, 330);

    drawFinderPattern(ctx, 200, 200);
    drawFinderPattern(ctx, 600, 200);
    drawFinderPattern(ctx, 200, 600);

    const logoZoneRadius = 120;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(centerX, centerY, logoZoneRadius, 0, Math.PI * 2); ctx.fill();

    drawEncodedRing(ctx, sealID, centerX, centerY);

    if(logo.naturalWidth > 0) ctx.drawImage(logo, centerX - 95, centerY - 95, 190, 190);
    
    drawCircularText(ctx, "ANOR • CERTIFICATION • CONFORMITÉ • CAMEROUN •", centerX, centerY, 340);
    drawLegalNotice(ctx, centerX, SIZE - 55);
}

function drawDotGridSeal(ctx, matrixString, centerX, centerY, radius) {
    const size = 8; 
    const step = (radius * 1.6) / size;
    const centerHole = 150;

    ctx.fillStyle = "#69a8f2";
    for(let y = 0; y < size; y++) {
        for(let x = 0; x < size; x++) {
            const index = y * size + x;
            if(matrixString[index] !== '1') continue;
            
            const px = centerX - radius + (x * step) + (step / 2);
            const py = centerY - radius + (y * step) + (step / 2);
            const dist = Math.hypot(px - centerX, py - centerY);
            
            if (dist > radius - 12 || dist < centerHole) continue;
            if ((Math.hypot(px - 200, py - 200) < 95) || (Math.hypot(px - 600, py - 200) < 95) || (Math.hypot(px - 200, py - 600) < 95)) continue;

            const dotSize = 4 + (seededRandomForRender(x * 1000 + y)() * 3);
            ctx.beginPath(); ctx.arc(px, py, dotSize, 0, Math.PI * 2); ctx.fill();
        }
    }
}

function drawFinderPattern(ctx, x, y) {
    ctx.fillStyle = "#008450";
    ctx.beginPath(); ctx.arc(x, y, 35, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#008450";
    ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.fill();
}

function drawEncodedRing(ctx, sealID, cx, cy) {
    const sectors = 64;
    const innerRadius = 135;
    const outerRadius = 160;
    const binaryData = [];

    for (let i = 0; i < sealID.length; i++) {
        const bits = sealID.charCodeAt(i).toString(2).padStart(8, '0');
        binaryData.push(...bits.split(''));
    }

    while (binaryData.length < sectors) {
        binaryData.push('0');
    }

    const finalBits = binaryData.slice(0, sectors);
    const angleStep = (Math.PI * 2) / sectors;

    for (let i = 0; i < sectors; i++) {
        const start = i * angleStep;
        const end = start + angleStep;

        ctx.beginPath();
        ctx.arc(cx, cy, outerRadius, start, end);
        ctx.arc(cx, cy, innerRadius, end, start, true);
        ctx.closePath();

        if (finalBits[i] === '1') {
            ctx.fillStyle = "#008450";
        } else {
            ctx.fillStyle = "#ffffff";
        }
        ctx.fill();
    }

    ctx.strokeStyle = "#69a8f2";
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(cx, cy, innerRadius, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, outerRadius, 0, Math.PI * 2); ctx.stroke();
}

function drawCircularText(ctx, text, cx, cy, radius) {
    ctx.save(); ctx.translate(cx, cy);
    ctx.font = "bold 24px Arial"; ctx.fillStyle = "#008450";
    const chars = text.split("");
    const angleStep = (Math.PI*2) / chars.length;
    let angle = -Math.PI/2;
    chars.forEach(char => {
        ctx.save(); ctx.rotate(angle); ctx.translate(0, -radius); ctx.fillText(char, 0, 0); ctx.restore();
        angle += angleStep;
    });
    ctx.restore();
}

function drawLegalNotice(ctx, cx, cy) {
    ctx.font = "12px Arial"; ctx.fillStyle = "#333"; ctx.textAlign = "center";
    ctx.fillText("Sceau ANOR protégé. Usage frauduleux passible de poursuites.", cx, cy);
    ctx.fillText("ANOR seal is protected. Fraudulent use is subject to prosecution.", cx, cy + 15);
}

document.addEventListener("DOMContentLoaded", () => {
    toggleDates();
});
</script>
</body>
</html>
