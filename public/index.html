<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge ANOR - Certification Souveraine (Haute Sécurité)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --anor-blue: #336699; --bg-color: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
        .main-wrapper { display: flex; gap: 30px; width: 100%; max-width: 1200px; align-items: flex-start; }
        .forge-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 40%; }
        .preview-pane { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 60%; text-align: center; }
        h2 { color: var(--anor-blue); text-align: center; border-bottom: 2px solid var(--anor-blue); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.85em; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--anor-blue); color: white; padding: 12px; border: none; cursor: pointer; width: 100%; border-radius: 6px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #2a5580; }
        .hidden { display: none; }
        #sceau_zone { margin-top: 25px; padding: 20px; border: 2px dashed var(--anor-blue); border-radius: 10px; text-align: center; display: none; }
        canvas { background: white; border-radius: 50%; box-shadow: 0 0 15px rgba(0,0,0,0.15); border: 2px solid #ccc; width: 300px; height: 300px; }
        #btnDownload { background: #28a745; margin-top: 15px; font-size: 1.1em; }
        #btnDownload:hover { background: #218838; }
        #img_preview { width: 100%; max-width: 300px; height: auto; border: 2px solid #ccc; border-radius: 10px; margin-bottom: 15px; display: block; margin: 10px auto; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="forge-card">
        <h2>FORGE ANOR - HAUTE SÉCURITÉ</h2>
        <form id="forgeForm">
            <div class="form-group"><label>NOM PRODUIT</label><input type="text" id="nom_produit" required></div>
            <div class="form-group"><label>PRODUCTEUR</label><input type="text" id="nom_producteur" required></div>
            <div class="form-group"><label>CARACTÉRISTIQUES PRODUIT</label><input type="text" id="caracteristiques" required></div>
            <div class="form-group"><label>LOT</label><input type="text" id="lot" required></div>
            <div class="form-group"><label>EMBALLAGE</label><input type="text" id="type_emballage" required></div>
            <div class="form-group"><label>PAYS D'ORIGINE</label><input type="text" id="pays_origine" oninput="toggleFields()" placeholder="Ex: Cameroun"></div>
            <div class="form-group"><label>VISUEL PRODUIT</label><input type="file" id="file_visuel" accept="image/*" onchange="previewFile()"></div>
            <div class="form-group"><label>CERTIFICAT (PDF)</label><input type="file" id="file_certificat" accept=".pdf"></div>
            
            <div id="camerounFields" class="hidden"><div class="form-group"><label>DATE CERTIFICAT CONFORMITÉ</label><input type="date" id="date_certificat_conformite"></div></div>
            <div id="autreFields"><div class="form-group"><label>FABRICATION</label><input type="date" id="date_fabrication"></div><div class="form-group"><label>PÉREMPTION</label><input type="date" id="date_peremption"></div></div>
            
            <button type="submit">GÉNÉRER L'EMPREINTE UNIQUE</button>
        </form>
    </div>

    <div class="preview-pane">
        <h2>PRÉVISUALISATION</h2>
        <img id="img_preview" src="" alt="Visuel">
        <div id="sceau_zone">
            <h3>Sceau Officiel Unique (Nébuleuse)</h3>
            <canvas id="sceauCanvas" width="1000" height="1000"></canvas>
            <p id="sig_debug" style="font-size: 0.7em; margin-top: 10px; color: #666;"></p>
            <button id="btnDownload" type="button" onclick="telechargerKit()">📥 TÉLÉCHARGER LE KIT HD (ZIP)</button>
        </div>
    </div>
</div>

<script>
    const BLEU_ANOR = "#336699";
    const CENTRE_HD = 500;

    function previewFile() {
        const file = document.getElementById('file_visuel').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => document.getElementById('img_preview').src = e.target.result;
        reader.readAsDataURL(file);
    }

    function toggleFields() {
        const pays = document.getElementById('pays_origine').value.toLowerCase().trim();
        document.getElementById('camerounFields').classList.toggle('hidden', pays !== 'cameroun');
        document.getElementById('autreFields').classList.toggle('hidden', pays === 'cameroun');
    }

    async function telechargerKit() {
        const zip = new JSZip();
        const nom = document.getElementById('nom_produit').value.replace(/\s+/g, '_');
        const prod = document.getElementById('nom_producteur').value.replace(/\s+/g, '_');
        const prefix = `${nom}_${prod}`;

        const modeEmploi = `GUIDE D'UTILISATION - SCEAU DE CERTIFICATION ANOR
-----------------------------------------------------------
1. CONDITIONS DE LISIBILITÉ :
   - Taille minimale : 15 mm de diamètre (ne pas descendre en dessous).
   - Distance de lecture par l'APK : 5 cm avec une mise au point stable.

2. EXIGENCES D'IMPRESSION (CRITIQUE) :
   - TYPE D'IMPRESSION : Exclusivement LASER HAUTE DÉFINITION (min. 600 DPI).
   - INTERDICTIONS : 
       - AUCUNE impression JET D'ENCRE (bavures garanties).
       - AUCUNE imprimante matricielle ou thermique basse résolution.
   - SUPPORT : Papier couché (glacé) ou étiquettes vinyles. Le papier poreux est proscrit.

3. SUPPORT TECHNIQUE ET IMPRESSION CERTIFIÉE :
   - Pour garantir la validité de votre sceau, contactez notre imprimerie partenaire agréée :
   - SERVICE IMPRESSION FORGE : (+237) 6XX XXX XXX.

4. INTÉGRITÉ :
   - Toute altération physique rendra le sceau non valide.`;

        const texteJuridique = `AVERTISSEMENT LÉGAL ET PROPRIÉTÉ INTELLECTUELLE - ANOR
-----------------------------------------------------------
1. PROPRIÉTÉ EXCLUSIVE :
   Le sceau de certification ANOR ainsi que l'algorithme cryptographique 
   associé sont la propriété exclusive de l'Agence des Normes et de la Qualité (ANOR). 
   Ce sceau est une œuvre protégée par les lois nationales et internationales 
   sur la propriété intellectuelle.

2. USAGE AUTORISÉ :
   L'utilisation de ce sceau est strictement limitée au produit et au lot 
   pour lesquels il a été généré via la plateforme officielle de la Forge ANOR. 
   Toute utilisation détournée, reproduction non autorisée, altération, 
   imitation ou tentative de contrefaçon est formellement interdite.

3. SANCTIONS PÉNALES :
   Toute reproduction, représentation ou destruction du sceau ANOR sans 
   autorisation expresse entraînera des poursuites judiciaires immédiates. 
   Les contrevenants s'exposent à des sanctions pénales lourdes pour contrefaçon 
   de marque, usurpation de certification officielle et mise en danger des consommateurs.`;

        zip.file(`${prefix}_Sceau.png`, document.getElementById('sceauCanvas').toDataURL().split(',')[1], {base64: true});
        zip.file("Mode_d_emploi_technique.txt", modeEmploi);
        zip.file("Textes_Juridiques_Contrefacon.txt", texteJuridique);
        
        const visuel = document.getElementById('file_visuel').files[0];
        if(visuel) zip.file(`${prefix}_Visuel.png`, visuel);
        
        const content = await zip.generateAsync({type:"blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `${prefix}_Kit_Complet.zip`;
        link.click();
    }

    document.getElementById('forgeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const fileInput = document.getElementById('file_visuel');
        const fileName = fileInput.files.length > 0 ? fileInput.files[0].name : 'p_default.png';
        
        const formData = {
            nom_produit: document.getElementById('nom_produit').value,
            nom_producteur: document.getElementById('nom_producteur').value,
            lot: document.getElementById('lot').value,
            type_emballage: document.getElementById('type_emballage').value,
            caracteristiques: document.getElementById('caracteristiques').value,
            pays_origine: document.getElementById('pays_origine').value,
            visuel_url: fileName,
            date_certificat_conformite: document.getElementById('date_certificat_conformite').value,
            date_fabrication: document.getElementById('date_fabrication').value,
            date_peremption: document.getElementById('date_peremption').value
        };

        let result;
        try {
            const response = await fetch('/api/produit/enregistrer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            result = await response.json();

            if (!response.ok && response.status !== 409) {
                throw new Error(result.message || "Erreur serveur");
            }

            if (response.status === 409) {
                alert("ALERTE : Ce produit et ce lot ont déjà été certifiés.");
                return;
            }

            if (result.success) {
                document.getElementById('sceau_zone').style.display = 'block';
                document.getElementById('sig_debug').innerText = "Signature: " + result.code_sceau.substring(0, 32) + "...";
                dessinerSceauNébuleuse(
                    result.structure_sceau,
                    result.bibliotheque
                );
            } else {
                alert("Erreur lors de la forge : " + result.message);
            }
        } catch(error) {
            alert("Impossible de contacter le serveur.");
            return;
        }
    });

    function dessinerForme(ctx, forme, taille) {
        switch(forme) {
            case "cercle":
                ctx.arc(0, 0, taille / 2, 0, Math.PI * 2);
                break;
            case "carre":
                ctx.rect(-taille/2, -taille/2, taille, taille);
                break;
            case "rectangle":
                ctx.rect(-taille, -taille/3, taille*2, taille/1.5);
                break;
            case "triangle":
                ctx.moveTo(0, -taille);
                ctx.lineTo(taille, taille);
                ctx.lineTo(-taille, taille);
                ctx.closePath();
                break;
            case "losange":
                ctx.moveTo(0, -taille);
                ctx.lineTo(taille, 0);
                ctx.lineTo(0, taille);
                ctx.lineTo(-taille, 0);
                ctx.closePath();
                break;
            case "croix":
                ctx.moveTo(-taille, 0);
                ctx.lineTo(taille, 0);
                ctx.moveTo(0, -taille);
                ctx.lineTo(0, taille);
                break;
            case "demi_cercle":
                ctx.arc(0, 0, taille, Math.PI, 2 * Math.PI);
                break;
            case "barre_verticale":
                ctx.rect(-taille/4, -taille, taille/2, taille*2);
                break;
        }
    }

    async function dessinerSceauNébuleuse(s, bibliotheque) {
        const canvas = document.getElementById('sceauCanvas');
        const ctx = canvas.getContext('2d');

        ctx.clearRect(0, 0, 1000, 1000);
        ctx.imageSmoothingEnabled = true;

        const centre = CENTRE_HD;

        ctx.strokeStyle = BLEU_ANOR;
        ctx.lineWidth = 15;

        // Contour externe uniquement
        ctx.beginPath();
        ctx.arc(centre, centre, 480, 0, Math.PI * 2);
        ctx.stroke();

        const logoSize = 210;
        
        // Bloc robuste de chargement du logo
        const img = new Image();
        img.crossOrigin = "anonymous";
        await new Promise((resolve) => {
            img.onload = resolve;
            img.onerror = resolve; 
            img.src = '/logo_anor_master.png';
        });

        if (img.complete && img.naturalWidth > 0) {
            ctx.drawImage(
                img,
                centre - logoSize,
                centre - logoSize,
                logoSize * 2,
                logoSize * 2
            );
        } else {
            ctx.fillStyle = BLEU_ANOR;
            ctx.font = "bold 80px Arial";
            ctx.textAlign = "center";
            ctx.fillText("ANOR", centre, centre + 25);
        }

        // Effet Ndop
        for(let i=0; i<72; i++){
            const angle = (i/72) * Math.PI * 2;
            const r = 420;
            const x = centre + Math.cos(angle) * r;
            const y = centre + Math.sin(angle) * r;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.beginPath();
            ctx.moveTo(-6, 0);
            ctx.lineTo(6, 0);
            ctx.moveTo(0, -6);
            ctx.lineTo(0, 6);
            ctx.strokeStyle = BLEU_ANOR;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.restore();
        }

        const anneaux = [
            {
                data: bibliotheque.noyau,
                rayon: 250,
                size: 18,
                decalage: 0
            },
            {
                data: bibliotheque.transition,
                rayon: 320,
                size: 18,
                decalage: 0.05
            },
            {
                data: bibliotheque.peripherie,
                rayon: 390,
                size: 18,
                decalage: 0.1
            }
        ];

        anneaux.forEach((anneau) => {
            const total = anneau.data.length;
            for(let i = 0; i < total; i++) {
                const item = anneau.data[i];
                const angle = (i / total) * Math.PI * 2 + anneau.decalage;
                const x = centre + Math.cos(angle) * anneau.rayon;
                const y = centre + Math.sin(angle) * anneau.rayon;

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                ctx.beginPath();
                dessinerForme(ctx, item.forme, anneau.size);
                
                ctx.fillStyle = BLEU_ANOR;
                ctx.strokeStyle = BLEU_ANOR;
                
                if(i % 2 === 0) {
                    ctx.fill();
                } else {
                    ctx.stroke();
                }
                ctx.restore();
            }
        });
    }
</script>
</body>
</html>
