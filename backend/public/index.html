<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge ANOR - Certification Souveraine</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- MOTEUR DE RENDU EXTERNE -->
    <script src="./forgeRenderer.js"></script>

    <style>
        :root { --anor-blue: #336699; --bg-color: #f4f7f6; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .main-wrapper {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            align-items: flex-start;
        }

        .forge-card, .preview-pane {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .forge-card { width: 40%; }
        .preview-pane { width: 60%; text-align: center; }

        h2 {
            color: var(--anor-blue);
            text-align: center;
            border-bottom: 2px solid var(--anor-blue);
            padding-bottom: 10px;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.85em;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            background: var(--anor-blue);
            color: white;
            padding: 12px;
            border: none;
            cursor: pointer;
            width: 100%;
            border-radius: 6px;
            font-weight: bold;
        }

        button:hover { background: #2a5580; }

        canvas {
            background: white;
            border-radius: 50%;
            border: 2px solid #ccc;
            width: 300px;
            height: 300px;
        }

        #sceau_zone {
            display: none;
            margin-top: 20px;
        }

        #img_preview {
            max-width: 300px;
            margin: 10px auto;
            border: 2px solid #ccc;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="main-wrapper">

    <!-- FORMULAIRE -->
    <div class="forge-card">
        <h2>FORGE ANOR</h2>

        <form id="forgeForm">

            <div class="form-group">
                <label>NOM PRODUIT</label>
                <input type="text" id="nom_produit" required>
            </div>

            <div class="form-group">
                <label>PRODUCTEUR</label>
                <input type="text" id="nom_producteur" required>
            </div>

            <div class="form-group">
                <label>CARACTÉRISTIQUES</label>
                <input type="text" id="caracteristiques" required>
            </div>

            <div class="form-group">
                <label>LOT</label>
                <input type="text" id="lot" required>
            </div>

            <div class="form-group">
                <label>EMBALLAGE</label>
                <input type="text" id="type_emballage" required>
            </div>

            <div class="form-group">
                <label>PAYS D'ORIGINE</label>
                <input type="text" id="pays_origine">
            </div>

            <div class="form-group">
                <label>VISUEL</label>
                <input type="file" id="file_visuel" accept="image/*">
            </div>

            <button type="submit">GÉNÉRER LE SCEAU</button>
        </form>
    </div>

    <!-- PREVIEW -->
    <div class="preview-pane">

        <h2>PRÉVISUALISATION</h2>

        <img id="img_preview">

        <div id="sceau_zone">
            <canvas id="sceauCanvas" width="1000" height="1000"></canvas>
            <p id="sig_debug"></p>

            <button id="btnDownload" onclick="telechargerKit()">
                📥 Télécharger ZIP
            </button>
        </div>

    </div>

</div>

<script>
/* =========================
   PREVIEW IMAGE
========================= */
function previewFile() {
    const file = document.getElementById('file_visuel').files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
        document.getElementById('img_preview').src = e.target.result;
    };
    reader.readAsDataURL(file);
}

document.getElementById('file_visuel')
    .addEventListener('change', previewFile);

/* =========================
   SUBMIT FORGE
========================= */
document.getElementById('forgeForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = {
        nom_produit: nom_produit.value,
        nom_producteur: nom_producteur.value,
        caracteristiques: caracteristiques.value,
        lot: lot.value,
        type_emballage: type_emballage.value,
        pays_origine: pays_origine.value
    };

    try {
        const response = await fetch('/api/produit/enregistrer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (!result.success) {
            alert(result.message);
            return;
        }

        document.getElementById('sceau_zone').style.display = 'block';
        document.getElementById('sig_debug').innerText =
            "Signature: " + result.code_sceau.substring(0, 32);

        // 🔥 UNIQUE POINT D’ENTRÉE DU MOTEUR
        window.dessinerSceauPremium(result.bibliotheque);

    } catch (err) {
        alert("Erreur serveur");
    }
});

/* =========================
   DOWNLOAD KIT (inchangé)
========================= */
async function telechargerKit() {
    const zip = new JSZip();

    const canvas = document.getElementById('sceauCanvas');
    const nom = nom_produit.value.replace(/\s+/g, '_');

    zip.file(`${nom}_sceau.png`,
        canvas.toDataURL().split(',')[1],
        {base64: true}
    );

    const blob = await zip.generateAsync({type:"blob"});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `${nom}_kit.zip`;
    link.click();
}
</script>

</body>
</html>
