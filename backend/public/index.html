<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge ANOR - Certification Souveraine</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script src="./forgeRenderer.js"></script>

    <style>
        :root { --anor-blue: #336699; --bg-color: #f4f7f6; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .main-wrapper {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            align-items: flex-start;
        }

        .forge-card, .preview-pane {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .forge-card { width: 40%; }
        .preview-pane { width: 60%; text-align: center; }

        h2 {
            color: var(--anor-blue);
            text-align: center;
            border-bottom: 2px solid var(--anor-blue);
            padding-bottom: 10px;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.85em;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            background: var(--anor-blue);
            color: white;
            padding: 12px;
            border: none;
            cursor: pointer;
            width: 100%;
            border-radius: 6px;
            font-weight: bold;
        }

        button:hover { background: #2a5580; }

        canvas {
            background: white;
            border-radius: 50%;
            border: 2px solid #ccc;
            width: 300px;
            height: 300px;
        }

        #sceau_zone {
            display: none;
            margin-top: 20px;
        }

        #img_preview {
            max-width: 300px;
            margin: 10px auto;
            border: 2px solid #ccc;
            border-radius: 10px;
        }
        .hidden { display: none; }
    </style>
</head>

<body>

<div class="main-wrapper">

    <div class="forge-card">
        <h2>FORGE ANOR</h2>

        <form id="forgeForm">

            <div class="form-group">
                <label>NOM PRODUIT</label>
                <input type="text" id="nom_produit" required>
            </div>

            <div class="form-group">
                <label>PRODUCTEUR</label>
                <input type="text" id="nom_producteur" required>
            </div>

            <div class="form-group">
                <label>COMPOSITION</label>
                <input type="text" id="composition" required>
            </div>

            <div class="form-group">
                <label>LOT</label>
                <input type="text" id="lot" required>
            </div>

            <div class="form-group">
                <label>QUANTITÉ</label>
                <input type="number" id="quantite" value="1" required>
            </div>

            <div class="form-group">
                <label>RÉFÉRENTIEL APPLICABLE</label>
                <input type="text" id="referentiel_applicable" required>
            </div>

            <div class="form-group">
                <label>NORME</label>
                <input type="text" id="norme" required>
            </div>

            <div class="form-group">
                <label>EMBALLAGE</label>
                <input type="text" id="type_emballage" required>
            </div>

            <div class="form-group">
                <label>PAYS D'ORIGINE</label>
                <input type="text" id="pays_origine" oninput="toggleFields()">
            </div>

            <div id="camerounFields" class="hidden">
                <div class="form-group"><label>DATE CERTIFICAT CONFORMITÉ</label><input type="date" id="date_certificat_conformite"></div>
            </div>
            <div id="autreFields">
                <div class="form-group"><label>DATE FABRICATION</label><input type="date" id="date_fabrication"></div>
                <div class="form-group"><label>DATE PÉREMPTION</label><input type="date" id="date_peremption"></div>
            </div>

            <div class="form-group">
                <label>CERTIFICAT DE CONFORMITÉ (PDF)</label>
                <input type="file" id="certificat_pdf" accept="application/pdf">
            </div>

            <div class="form-group">
                <label>VISUEL DU PRODUIT</label>
                <input type="file" id="file_visuel" accept="image/*">
            </div>

            <button type="submit">GÉNÉRER LE SCEAU</button>
        </form>
    </div>

    <div class="preview-pane">

        <h2>PRÉVISUALISATION</h2>

        <img id="img_preview">

        <div id="sceau_zone">
            <canvas id="sceauCanvas" width="1000" height="1000"></canvas>
            <p id="sig_debug"></p>

            <button id="btnDownload" onclick="telechargerKit()">
                📥 Télécharger ZIP
            </button>
        </div>

    </div>

</div>

<script>
/* =========================
   LOGIQUE ORIGINE/DATES
========================= */
function toggleFields() {
    const pays = document.getElementById('pays_origine').value.toLowerCase().trim();
    if (pays === 'cameroun') {
        document.getElementById('camerounFields').classList.remove('hidden');
        document.getElementById('autreFields').classList.add('hidden');
    } else {
        document.getElementById('camerounFields').classList.add('hidden');
        document.getElementById('autreFields').classList.remove('hidden');
    }
}

/* =========================
   PREVIEW IMAGE
========================= */
function previewFile() {
    const file = document.getElementById('file_visuel').files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
        document.getElementById('img_preview').src = e.target.result;
    };
    reader.readAsDataURL(file);
}

document.getElementById('file_visuel')
    .addEventListener('change', previewFile);

/* =========================
   SUBMIT FORGE
========================= */
document.getElementById('forgeForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData();
    formData.append('nom_produit', document.getElementById('nom_produit').value);
    formData.append('nom_producteur', document.getElementById('nom_producteur').value);
    formData.append('composition', document.getElementById('composition').value);
    formData.append('lot', document.getElementById('lot').value);
    formData.append('quantite', document.getElementById('quantite').value);
    formData.append('referentiel_applicable', document.getElementById('referentiel_applicable').value);
    formData.append('norme', document.getElementById('norme').value);
    formData.append('type_emballage', document.getElementById('type_emballage').value);
    formData.append('pays_origine', document.getElementById('pays_origine').value);
    
    // Ajout des champs conditionnels au formData
    const pays = document.getElementById('pays_origine').value.toLowerCase().trim();
    if (pays === 'cameroun') {
        formData.append('date_certificat_conformite', document.getElementById('date_certificat_conformite').value);
    } else {
        formData.append('date_fabrication', document.getElementById('date_fabrication').value);
        formData.append('date_peremption', document.getElementById('date_peremption').value);
    }

    formData.append('certificat_pdf', document.getElementById('certificat_pdf').files[0]);
    formData.append('visuel', document.getElementById('file_visuel').files[0]);

    try {
        const response = await fetch('/api/produit/enregistrer', {
            method: 'POST',
            body: formData
        });

        const result = await response.json();

        if (!result.success) {
            alert(result.message);
            return;
        }

        document.getElementById('sceau_zone').style.display = 'block';
        document.getElementById('sig_debug').innerText =
            "Signature: " + result.code_sceau.substring(0, 32);

        window.dessinerSceauPremium(result.code_sceau, result.bibliotheque);

    } catch (err) {
        alert("Erreur lors de l'enregistrement du lot.");
    }
});

/* =========================
   DOWNLOAD KIT
========================= */
async function telechargerKit() {
    const zip = new JSZip();

    const canvas = document.getElementById('sceauCanvas');
    const nom = document.getElementById('nom_produit').value.replace(/\s+/g, '_');

    zip.file(`${nom}_sceau.png`,
        canvas.toDataURL().split(',')[1],
        {base64: true}
    );

    const blob = await zip.generateAsync({type:"blob"});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `${nom}_kit.zip`;
    link.click();
}
</script>

</body>
</html>
